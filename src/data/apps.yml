  logo: /images/apps/blacksky.ico

- name: Pckt
  description: Another AT Protocol blog platform. Write and publish posts stored in your ATProto repository.
  url: https://pckt.blog
  category: Publishing
  logo: /images/apps/pckt.png

- name: Open Social
  description: A tool for creating groups on AT Protocol for other AT Protocol apps.
  url: https://opensocial.community
