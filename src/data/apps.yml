- name: Bluesky
  description: The flagship social app built on AT Protocol. Microblogging with algorithmic choice, custom feeds, and account portability.
  url: https://bsky.app
  bluesky: https://bsky.app/profile/bsky.app
  category: Social
  logo: /images/apps/bluesky.png

- name: Smoke Signal
  description: Decentralized event and RSVP management. Create, discover, and RSVP to events using your AT Protocol identity.
  url: https://smokesignal.events
  bluesky: https://bsky.app/profile/smokesignal.events
  category: Events
  logo: /images/apps/smokesignal.png

- name: Tangled
  description: Git hosting on AT Protocol. Repositories, issues, and code collaboration tied to your decentralized identity.
  url: https://tangled.org
  bluesky: https://bsky.app/profile/tangled.org
  category: Developer Tools
  logo: /images/apps/tangled.webp

- name: Offprint
  description: Newsletter and long-form publishing platform. Write, publish, and distribute to email subscribers and ATProto readers.
  url: https://offprint.blog
  category: Publishing

- name: Leaflet
  description: A blog reader and writing platform for AT Protocol. Read and publish standard.site content from a clean, focused interface.
  url: https://leaflet.pub
  category: Publishing
  logo: /images/apps/leaflet.png

- name: WhiteWind
  description: Long-form blogging on AT Protocol. Write markdown posts that are stored in your personal data repository.
  url: https://whtwnd.com
  bluesky: https://bsky.app/profile/whtwnd.com
  category: Publishing
  logo: /images/apps/whitewind.svg

- name: Frontpage
  description: A link aggregator and discussion forum built on AT Protocol. Like Reddit, but decentralized and tied to your ATProto identity.
  url: https://frontpage.fyi
  bluesky: https://bsky.app/profile/frontpage.fyi
  category: Social
  logo: /images/apps/frontpage.svg

- name: Linkat
  description: A link-in-bio tool for AT Protocol. Create a portable, decentralized profile page with your important links.
  url: https://linkat.blue
  category: Identity
  logo: /images/apps/linkat.png

- name: deck.blue
  description: A multi-column client for Bluesky. Power-user interface with multiple timelines, lists, and feeds side by side.
  url: https://deck.blue
  bluesky: https://bsky.app/profile/deck.blue
  category: Social

- name: Graysky
  description: A native mobile client for Bluesky with a focus on performance and polish. Available on iOS and Android.
  url: https://graysky.app
  bluesky: https://bsky.app/profile/graysky.app
  category: Social
  logo: /images/apps/graysky.ico

- name: Clearsky
  description: Search and analytics tool for AT Protocol. See who blocks whom, explore the network graph, and look up account history.
  url: https://clearsky.app
  bluesky: https://bsky.app/profile/clearsky.app
